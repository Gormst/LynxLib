{% extends 'books/base.html' %}

{% block title %}Author Not Found - Lynx Library{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card text-center">
            <div class="card-body py-5">
                <i class="fas fa-user-circle fa-5x text-muted mb-4"></i>
                <h1 class="display-4 text-muted mb-3">404</h1>
                <h2 class="card-title mb-3">Author Not Found</h2>
                <p class="card-text text-muted mb-4">
                    The author you're looking for doesn't exist in our database or may have been removed.
                </p>
                <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                    <a href="{% url 'books:catalog' %}" class="btn btn-primary btn-lg">
                        <i class="fas fa-home me-2"></i>Browse Books
                    </a>
                    <a href="{% url 'books:popular_books' %}" class="btn btn-outline-primary btn-lg">
                        <i class="fas fa-star me-2"></i>Popular Books
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
